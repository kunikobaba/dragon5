function getTimeMessage(){
const now = new Date();
const hour = now.getHours();
const day = now.getDay();

  if(day === 0){

    return "🌿日曜日の龍神メッセージ🌿\n" +
    sundayWords[Math.floor(Math.random()*sundayWords.length)];
  }

  if(hour >= 0 && hour < 5){
    return "🌌深夜の龍神メッセージ：" +
    deepNightWords[Math.floor(Math.random()*deepNightWords.length)];

  }else if(hour >= 5 && hour < 8){
    return "🌅早朝の龍神メッセージ：" +
    earlyMorningWords[Math.floor(Math.random()*earlyMorningWords.length)];

  }else if(hour >= 8 && hour < 11){
    return "龍神からの朝のメッセージ：" +
    morningWords[Math.floor(Math.random()*morningWords.length)];

  }else if(hour >= 11 && hour < 17){
    return "龍神からの昼のメッセージ：" +
    noonWords[Math.floor(Math.random()*noonWords.length)];

  }else{
    return "龍神からの夜のメッセージ：" +
    nightWords[Math.floor(Math.random()*nightWords.length)];
  }
}

let selected=null;

function render(){
  const el=document.getElementById("cards");
  el.innerHTML="";

  cards.forEach(c=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerHTML=`<img src="${c.img}"><b>${c.name}</b>`;

    d.onclick=()=>{
      selected=c;
      [...el.children].forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected");
    };

    el.appendChild(d);
  });
}

  document.getElementById("bookLink").href=book.link;

  };

  if(book.video){
    document.getElementById("videoBtn").href = book.video;

    document.getElementById("videoBtn").style.display = "inline-block";

    document.getElementById("videoBtn").style.display = "none";
  }

  });
